services:
  stadiumiq:
    build: .
    ports:
      - "8000:8000"
    # Keys are optional — without them the app serves offline demo mode.
    env_file:
      - path: .env
        required: false
    environment:
      APP_ENV: production
      LOG_LEVEL: INFO
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
