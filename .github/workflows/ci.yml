name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: pip install -r requirements-dev.txt
      - run: pytest

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t stadiumiq .
      - name: Container serves health endpoint
        run: |
          docker run -d --rm -p 8000:8000 --name smoke stadiumiq
          for i in $(seq 1 20); do
            curl -sf http://localhost:8000/api/health && exit 0
            sleep 1
          done
          docker logs smoke
          exit 1
